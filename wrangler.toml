name = "munny"
compatibility_date = "2026-06-01"

# Domínio próprio (a zona já está na conta Cloudflare, então o deploy provisiona DNS + HTTPS sozinho).
routes = [
  { pattern = "munnygestorfinanceiro.com", custom_domain = true },
  { pattern = "www.munnygestorfinanceiro.com", custom_domain = true }
]

# O site continua estático (index.html + ícones + manifest), servido como assets.
# O worker.js só intercepta /api/* (checkout e webhook do Mercado Pago);
# todo o resto vai direto pros assets sem passar pelo script.
main = "worker.js"

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
